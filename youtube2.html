<!DOCTYPE html>
<html>

  <head>
    <title>Youtube.com</title>

    <style>
      p{
        font-family: Arial;
        margin-left: 7px;
        margin-top:0px;
        margin-bottom:0px;
      }

      button{
        margin-left:7px;
        margin-bottom:7px;
        background-color: rgb(47, 137, 255);
        color:white;
        border:none;
        width: 100px;
        height: 30px;
        border-radius: 4px;
        font-family: Arial;
        font-size: 13px;
        
        transition: opacity 0.15s;
      }

      button:hover{
        opacity: 0.7;
        cursor: pointer;
      }

      .friend{
        width:150px;
        height: 150px;
        object-fit: cover;
        object-position: bottom;
      }

      .add-friend-div{
        width:150px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        display:inline-block;
      }

      .name{
        font-weight: bold;
      }

      .mutual-friends{
        font-size: 14px;
        margin-bottom: 10px;
        color: rgb(110, 110, 110);
      }

    </style>

  </head>
  <body>
    <div class="add-friend-div">
      <img class="friend" src="FhOlyxvXEBsyYLH.jpg">
      <p class="name">
        Andrew Tate
      </p>

      <p class="mutual-friends">
        53 mutual friends
      </p>

      <button>
        Add Friend
      </button>
    </div>
  </body>

</html>
