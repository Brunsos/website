function nthIndex(str, pat, n){ //just used to put string of hsl values from txt file into cArray 
    var L= str.length, i= -1;
    while(n-- && i++<L){
        i= str.indexOf(pat, i);
        if (i < 0) break;
    }
    return i;
}

function openFile(event){

	cArray = [];
	var text = r.result;
	var n = 1;
		for(var c=0;c<361;c++){
		var index1 = nthIndex(text,"h",n);//index of "h"
		var index2 = nthIndex(text,")",n) + 1;//index of "("
		var value = text.slice(index1, index2);//slices from h to )
		cArray.push(value);//adds to array
		n++;//moves to next set of indexes
		}

function delay(ms) {
    return new Promise(resolve => {
        setTimeout(() => {
            resolve();
        }, ms);
    });
}

async function bubbleSort(array){
	for(i=0;i<array.length;i++){
		for(j=1;j<array.length;j++){
		var hue1 = array[j-1].slice(4,array[j-1].indexOf(","));
		var hue2 = array[j].slice(4,array[j].indexOf(","));
			if(hueFromHsl(array[j-1]) > hueFromHsl(array[j])){
			var temp = array[j-1];
			array[j-1] = array[j];
			array[j] = temp;
			draw(array);
			}
		}
     await delay(1);
	}
return array;
}


function mergeSort(array, leftIndex, rightIndex) {
    length = rightIndex - leftIndex
    if (length < 2) {
        return array;
    }
    var mid = leftIndex + Math.floor(length / 2);
    mergeSort(array, leftIndex, mid)
    mergeSort(array, mid, rightIndex)
    merge(array, leftIndex, mid, rightIndex)
	
}

async function mergeSort(array, leftIndex, rightIndex) {
    length = rightIndex - leftIndex
    if (length < 2) {
        return array;
    }
    var mid = leftIndex + Math.floor(length / 2);

    mergeSort(array, leftIndex, mid)
    mergeSort(array, mid, rightIndex)      
    await delay(1000*Math.sqrt(rightIndex-leftIndex));
	draw(array)
	merge(array, leftIndex, mid, rightIndex)
}

function merge(array, leftIndex, mid, rightIndex) {
    var result = [];
    var l = leftIndex,
        r = mid;
    while (l < mid && r < rightIndex) {
        if (hueFromHsl(array[l]) < hueFromHsl(array[r])) {
            result.push(array[l++]);
        } else {
            result.push(array[r++]);
        }
    }
    result = result.concat(array.slice(l, mid)).concat(array.slice(r, rightIndex));
    for (let i = 0; i < rightIndex - leftIndex; i++) {
        array[leftIndex + i] = result[i]
    }
}

async function shuffle(array){
	document.getElementById("bSort").disabled = false;
	document.getElementById("mSort").disabled = false;
	for(i=array.length-1;i>0;i--){
		var random = Math.floor(Math.random() * (i+1));
		var temp = array[i];
		array[i] = array[random];
		array[random] = temp;
		draw(array);
		await delay(1)
	}
	return array
}
